<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">    <title>Beat Runner - Neon Rhythm Game</title>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        /* ... existing styles ... */
        /* ========================================
           STYLES - UI and Visual Design
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* HUD - Score Display */
        /* Find #hud and replace the 'top' property */
#hud {
    position: fixed;
    /* Use safe area plus a little padding */
    top: max(20px, env(safe-area-inset-top) + 15px);
    left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 40px;
    z-index: 100;
    pointer-events: none;
    width: 100%; /* Ensure it spans width for centering */
    justify-content: center; /* Better centering */
}

        .hud-item {
            text-align: center;
            color: #fff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
        }

        .hud-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .hud-value {
            font-size: 28px;
            font-weight: bold;
        }

        /* Start Screen */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, rgba(20, 0, 40, 0.9) 0%, rgba(0, 0, 0, 0.95) 100%);
            z-index: 200;
        }

        #start-screen h1 {
            font-size: 72px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin-bottom: 10px;
            text-shadow: 
                0 0 10px #ff00ff,
                0 0 20px #ff00ff,
                0 0 40px #ff00ff,
                0 0 80px #ff00ff;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #ff00ff; }
            50% { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 80px #00ffff; }
        }

        #start-screen .subtitle {
            font-size: 18px;
            color: #00ffff;
            letter-spacing: 5px;
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        .btn {
            padding: 20px 60px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 5px;
            border: 2px solid #ff00ff;
            background: transparent;
            color: #ff00ff;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .controls-info {
            margin-top: 40px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            text-align: center;
        }

        .controls-info span {
            display: inline-block;
            padding: 5px 15px;
            border: 1px solid rgba(255,255,255,0.3);
            margin: 5px;
            border-radius: 5px;
        }

        /* Game Over Screen */
        #gameover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, rgba(40, 0, 20, 0.95) 0%, rgba(0, 0, 0, 0.98) 100%);
            z-index: 200;
        }

        #gameover-screen h2 {
            font-size: 56px;
            color: #ff0066;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #ff0066, 0 0 40px #ff0066;
        }

        .final-score {
            font-size: 24px;
            color: #fff;
            margin-bottom: 10px;
        }

        .final-score span {
            color: #00ffff;
            font-size: 36px;
            font-weight: bold;
        }

        #gameover-screen .btn {
            margin-top: 30px;
        }

        /* Beat Indicator */
        #beat-indicator {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #ff00ff;
            opacity: 0.5;
            transition: transform 0.08s ease-out, opacity 0.08s ease-out, box-shadow 0.08s ease-out;
            z-index: 100;
            display: none;
            pointer-events: none;
        }

        #beat-indicator.pulse {
            transform: translateX(-50%) scale(1.3);
            opacity: 1;
            box-shadow: 0 0 30px #ff00ff, 0 0 60px #00ffff;
        }

        /* Screen Flash Effect */
        #screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            transition: opacity 0.05s ease-out;
        }

        /* Mobile Controls */
        #mobile-controls {
    position: fixed;
    /* Lift controls up above the home indicator */
    bottom: max(20px, env(safe-area-inset-bottom) + 30px);
    left: 0;
    right: 0;
    display: none;
    justify-content: space-between;
    padding: 0 30px; /* Increased side padding */
    z-index: 100;
    pointer-events: none;
}
        .mobile-btn {
    width: 120px; /* Bigger touch target */
    height: 120px;
    border: 2px solid rgba(255, 0, 255, 0.3); /* Subtler border */
    border-radius: 50%;
    background: rgba(255, 0, 255, 0.05); /* Fainter background */
    /* ... rest of existing styles ... */
}

        .mobile-btn:active {
            background: rgba(255, 0, 255, 0.4);
            transform: scale(0.95);
        }

        @media (max-width: 768px) {
            #start-screen h1 {
                font-size: 36px;
                letter-spacing: 5px;
            }
            
            #start-screen .subtitle {
                font-size: 14px;
            }
            
            .btn {
                padding: 15px 40px;
                font-size: 18px;
            }
            
            #mobile-controls {
                display: flex;
            }
            
            .hud-value {
                font-size: 22px;
            }
        }
/* ========================================
           NEW STYLE: Neon Creator Name
           ======================================== */
        .creator-name {
            font-size: 18px;            /* Size */
            color: #ffffff;             /* White Core */
            text-transform: uppercase;
            letter-spacing: 4px;        /* Wide spacing */
            font-weight: bold;
            margin-bottom: 40px;        /* Space above the button */
            
            /* NEON GLOW EFFECT */
            text-shadow: 
                0 0 5px #ff00ff,
                0 0 10px #ff00ff,
                0 0 20px #ff00ff,
                0 0 40px #ff00ff;
                
            animation: namePulse 2s ease-in-out infinite;
        }

        @keyframes namePulse {
            0%, 100% { 
                opacity: 0.8; 
                text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; 
            }
            50% { 
                opacity: 1; 
                text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff, 0 0 60px #ff00ff; 
            }
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    
    <!-- HUD -->
    <div id="hud">
        <div class="hud-item">
            <div class="hud-label">Distance</div>
            <div class="hud-value" id="distance-value">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Orbs</div>
            <div class="hud-value" id="orbs-value">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Score</div>
            <div class="hud-value" id="score-value">0</div>

    </div>

    <!-- Mobile Controls -->
    <div id="mobile-controls">
        <div class="mobile-btn" id="left-btn">◀</div>
        <div class="mobile-btn" id="right-btn">▶</div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>Beat Runner</h1>
        <div class="subtitle">Neon Rhythm Experience</div>
        
        <div class="creator-name">Created By Alon Iter</div>
        <button class="btn" id="start-btn">Start Game</button>
        <div class="controls-info">
            <div><span>←</span> <span>→</span> Arrow Keys to Move</div>
            <div>or <span>Swipe</span> / <span>Tap</span> on Mobile</div>

    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen">
        <h2>Game Over</h2>
        <div class="final-score">Distance: <span id="final-distance">0</span>m</div>
        <div class="final-score">Orbs Collected: <span id="final-orbs">0</span></div>
        <div class="final-score">Final Score: <span id="final-score">0</span></div>
        <button class="btn" id="restart-btn">Play Again</button>

    <!-- Beat Indicator -->

    <!-- Screen Flash -->

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
/* ========================================
   BEAT RUNNER - Main Game Code
   A Neon Rhythm Runner Game
   ======================================== */

// ========================================
// CONFIGURATION
// ========================================
const CONFIG = {
    // Game settings - lanes ordered LEFT to RIGHT
    LANE_WIDTH: 3,
    LANE_POSITIONS: [-3, 0, 3], // Lane 0 = LEFT (-3), Lane 1 = CENTER (0), Lane 2 = RIGHT (+3)
    INITIAL_SPEED: 28,
    MAX_SPEED: 55,
    SPEED_INCREMENT: 0.3,
    
    // Beat settings
    BPM: 128,
    get BEAT_INTERVAL() { return 60 / this.BPM; },
    
    // Spawn settings
    SPAWN_DISTANCE: 120,
    DESPAWN_DISTANCE: -15,
    OBSTACLE_MIN_GAP: 18,
    ORB_SPAWN_CHANCE: 0.5,
    
    // Visual settings
    FOG_NEAR: 25,
    FOG_FAR: 120,
    
    // Colors
    COLORS: {
        PINK: 0xff00ff,
        CYAN: 0x00ffff,
        PURPLE: 0x9900ff,
        BLUE: 0x0066ff,
        ORANGE: 0xff6600,
        WHITE: 0xffffff
    }
};

// ========================================
// GAME STATE
// ========================================
const GameState = {
    isPlaying: false,
    isPaused: false,
    distance: 0,
    orbs: 0,
    score: 0,
    currentLane: 1, // Start in center
    speed: CONFIG.INITIAL_SPEED,
    lastBeatTime: 0,
    beatPhase: 0,
    gameStartTime: 0
};

// ========================================
// GLOBAL VARIABLES
// ========================================
let scene, camera, renderer;
let player, playerGlow, playerRing;
let obstacles = [];
let collectibles = [];
let floorTiles = [];
let sidePillars = [];
let particleSystem;
let animationFrameId;
let lastTime = 0;
let audioContext, gainNode;

// DOM Elements
const canvas = document.getElementById('game-canvas');
const hud = document.getElementById('hud');
const startScreen = document.getElementById('start-screen');
const gameoverScreen = document.getElementById('gameover-screen');
const beatIndicator = document.getElementById('beat-indicator');
const screenFlash = document.getElementById('screen-flash');
const mobileControls = document.getElementById('mobile-controls');

// HUD Values
const distanceValue = document.getElementById('distance-value');
const orbsValue = document.getElementById('orbs-value');
const scoreValue = document.getElementById('score-value');
const finalDistance = document.getElementById('final-distance');
const finalOrbs = document.getElementById('final-orbs');
const finalScore = document.getElementById('final-score');

// ========================================
// INITIALIZATION
// ========================================
function init() {
    // Create scene
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050010);
    scene.fog = new THREE.Fog(0x050010, CONFIG.FOG_NEAR, CONFIG.FOG_FAR);
    
    // Create camera - positioned BEHIND player looking FORWARD
    camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 4.5, -7);
    camera.lookAt(0, 1.5, 30);
    
    // Create renderer with optimizations
    renderer = new THREE.WebGLRenderer({ 
        canvas: canvas, 
        antialias: window.devicePixelRatio < 2,
        powerPreference: "high-performance",
        stencil: false,
        depth: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    
    // Create game elements
    createLights();
    createFloor();
    createPlayer();
    createSidePillars();
    createParticles();
    
    // Setup audio
    setupAudio();
    
    // Setup controls
    setupControls();
    
    // Handle resize
    window.addEventListener('resize', onWindowResize);
    
    // Handle visibility change (pause when tab hidden)
    document.addEventListener('visibilitychange', onVisibilityChange);
    
    // Start render loop
    lastTime = performance.now();
    animate();
}

// ========================================
// LIGHTS
// ========================================
function createLights() {
    // Ambient light
    const ambient = new THREE.AmbientLight(0x333355, 0.6);
    scene.add(ambient);
    
    // Hemisphere light for better ambient
    const hemi = new THREE.HemisphereLight(0x0066ff, 0xff00ff, 0.3);
    scene.add(hemi);
    
    // Point lights for neon effect
    const pinkLight = new THREE.PointLight(CONFIG.COLORS.PINK, 1.5, 40);
    pinkLight.position.set(-8, 4, 15);
    scene.add(pinkLight);
    
    const cyanLight = new THREE.PointLight(CONFIG.COLORS.CYAN, 1.5, 40);
    cyanLight.position.set(8, 4, 15);
    scene.add(cyanLight);
}

// ========================================
// FLOOR - Infinite Neon Track
// ========================================
function createFloor() {
    const tileLength = 25;
    const numTiles = 10;
    
    for (let i = 0; i < numTiles; i++) {
        const tile = createFloorTile(tileLength);
        tile.position.z = i * tileLength;
        tile.userData.length = tileLength;
        scene.add(tile);
        floorTiles.push(tile);
    }
}

function createFloorTile(length) {
    const group = new THREE.Group();
    
    // Main floor
    const floorGeo = new THREE.PlaneGeometry(14, length, 1, 1);
    const floorMat = new THREE.MeshStandardMaterial({
        color: 0x0a0a1a,
        emissive: 0x110022,
        emissiveIntensity: 0.2,
        metalness: 0.7,
        roughness: 0.4
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    group.add(floor);
    
    // Lane dividers (shared geometry)
    const dividerGeo = new THREE.BoxGeometry(0.08, 0.08, length);
    const dividerMat = new THREE.MeshBasicMaterial({
        color: CONFIG.COLORS.PINK,
        transparent: true,
        opacity: 0.7
    });
    
    [-1.5, 1.5].forEach(x => {
        const divider = new THREE.Mesh(dividerGeo, dividerMat);
        divider.position.set(x, 0.04, 0);
        group.add(divider);
    });
    
    // Edge lines
    const edgeGeo = new THREE.BoxGeometry(0.15, 0.15, length);
    const edgeMat = new THREE.MeshBasicMaterial({
        color: CONFIG.COLORS.CYAN,
        transparent: true,
        opacity: 0.85
    });
    
    [-7, 7].forEach(x => {
        const edge = new THREE.Mesh(edgeGeo, edgeMat);
        edge.position.set(x, 0.08, 0);
        group.add(edge);
    });
    
    // Grid lines (reduced count for performance)
    const gridGeo = new THREE.BoxGeometry(14, 0.03, 0.06);
    const gridMat = new THREE.MeshBasicMaterial({
        color: CONFIG.COLORS.PURPLE,
        transparent: true,
        opacity: 0.25
    });
    
    for (let i = 0; i < length; i += 4) {
        const gridLine = new THREE.Mesh(gridGeo, gridMat);
        gridLine.position.set(0, 0.015, i - length / 2);
        group.add(gridLine);
    }
    
    return group;
}

// ========================================
// PLAYER - Glowing Neon Sphere
// ========================================
function createPlayer() {
    const group = new THREE.Group();
    
    // Main sphere
    const sphereGeo = new THREE.SphereGeometry(0.45, 24, 24);
    const sphereMat = new THREE.MeshStandardMaterial({
        color: CONFIG.COLORS.CYAN,
        emissive: CONFIG.COLORS.CYAN,
        emissiveIntensity: 0.9,
        metalness: 0.95,
        roughness: 0.05
    });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    group.add(sphere);
    
    // Inner glow
    const glowGeo = new THREE.SphereGeometry(0.6, 16, 16);
    const glowMat = new THREE.MeshBasicMaterial({
        color: CONFIG.COLORS.CYAN,
        transparent: true,
        opacity: 0.25,
        side: THREE.BackSide
    });
    playerGlow = new THREE.Mesh(glowGeo, glowMat);
    group.add(playerGlow);
    
    // Outer ring
    const ringGeo = new THREE.TorusGeometry(0.6, 0.04, 8, 24);
    const ringMat = new THREE.MeshBasicMaterial({
        color: CONFIG.COLORS.PINK,
        transparent: true,
        opacity: 0.7
    });
    playerRing = new THREE.Mesh(ringGeo, ringMat);
    playerRing.rotation.x = Math.PI / 2;
    group.add(playerRing);
    
    // Point light
    const playerLight = new THREE.PointLight(CONFIG.COLORS.CYAN, 1.5, 8);
    group.add(playerLight);
    
    group.position.set(0, 1, 0);
    scene.add(group);
    player = group;
}

// ========================================
// Player Movement Controller
// FIXED: Proper left/right mapping
// ========================================
const PlayerController = {
    targetX: 0,
    currentX: 0,
    laneChangeSpeed: 12,
    bobOffset: 0,
    
    // direction: +1 = move RIGHT (higher X), -1 = move LEFT (lower X)
    switchLane(direction) {
        if (!GameState.isPlaying) return;
        
        const newLane = GameState.currentLane + direction;
        if (newLane >= 0 && newLane <= 2) {
            GameState.currentLane = newLane;
            this.targetX = CONFIG.LANE_POSITIONS[newLane];
            playLaneChangeSound();
        }
    },
    
    update(delta, elapsed) {
        // Smooth lane transition
        const diff = this.targetX - this.currentX;
        this.currentX += diff * Math.min(this.laneChangeSpeed * delta, 0.35);
        player.position.x = this.currentX;
        
        // Tilt effect during movement (tilt in direction of movement)
        const targetTilt = -diff * 0.3;
        player.rotation.z += (targetTilt - player.rotation.z) * 6 * delta;
        
        // Smooth bobbing animation
        this.bobOffset = Math.sin(elapsed * 6) * 0.08;
        player.position.y = 1 + this.bobOffset;
        
        // Rotate effects
        if (playerGlow) {
            playerGlow.rotation.y += delta * 1.5;
        }
        if (playerRing) {
            playerRing.rotation.z += delta * 2;
        }
    },
    
    reset() {
        this.targetX = 0;
        this.currentX = 0;
        this.bobOffset = 0;
        GameState.currentLane = 1;
        if (player) {
            player.position.set(0, 1, 0);
            player.rotation.set(0, 0, 0);
        }
    }
};

// ========================================
// SIDE PILLARS - Light Columns
// ========================================
function createSidePillars() {
    const pillarCount = 12;
    const spacing = 20;
    
    for (let i = 0; i < pillarCount; i++) {
        [-12, 12].forEach(x => {
            const pillar = createPillar(x < 0);
            pillar.position.set(x, 0, i * spacing);
            pillar.userData.spacing = spacing;
            scene.add(pillar);
            sidePillars.push(pillar);
        });
    }
}

function createPillar(isLeft) {
    const group = new THREE.Group();
    
    // Main pillar
    const pillarGeo = new THREE.BoxGeometry(0.4, 12, 0.4);
    const pillarMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a2e,
        emissive: CONFIG.COLORS.PURPLE,
        emissiveIntensity: 0.25,
        metalness: 0.7,
        roughness: 0.3
    });
    const pillar = new THREE.Mesh(pillarGeo, pillarMat);
    pillar.position.y = 6;
    group.add(pillar);
    
    // Light strip
    const stripGeo = new THREE.BoxGeometry(0.08, 11, 0.08);
    const stripColor = isLeft ? CONFIG.COLORS.PINK : CONFIG.COLORS.CYAN;
    const stripMat = new THREE.MeshBasicMaterial({
        color: stripColor,
        transparent: true,
        opacity: 0.85
    });
    const strip = new THREE.Mesh(stripGeo, stripMat);
    strip.position.set(isLeft ? 0.2 : -0.2, 6, 0.2);
    group.add(strip);
    
    // Top light (reduced intensity for performance)
    const topLight = new THREE.PointLight(stripColor, 0.4, 12);
    topLight.position.y = 12;
    group.add(topLight);
    
    return group;
}

// ========================================
// PARTICLES - Background Effect
// ========================================
function createParticles() {
    const particleCount = 300;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const velocities = new Float32Array(particleCount);
    
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 40;
        positions[i * 3 + 1] = Math.random() * 25;
        positions[i * 3 + 2] = Math.random() * 150;
        velocities[i] = 0.3 + Math.random() * 0.7;
    }
    
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.userData.velocities = velocities;
    
    const material = new THREE.PointsMaterial({
        color: CONFIG.COLORS.CYAN,
        size: 0.15,
        transparent: true,
        opacity: 0.5,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
    });
    
    particleSystem = new THREE.Points(geometry, material);
    scene.add(particleSystem);
}

// ========================================
// OBSTACLES - Blocking Gates/Cubes
// ========================================
const ObstacleManager = {
    lastSpawnZ: 60,
    spawnQueue: [],
    
    // Patterns: array of lane indices to block
    patterns: [
        [0], [1], [2],           // Single lane blocks
        [0, 1], [1, 2], [0, 2],  // Double lane blocks
    ],
    
    spawn() {
        const z = this.lastSpawnZ + CONFIG.OBSTACLE_MIN_GAP + Math.random() * 12;
        
        // Select pattern (weighted toward single/double, never triple)
        const patternIndex = Math.floor(Math.random() * this.patterns.length);
        const pattern = this.patterns[patternIndex];
        
        // Create obstacles for blocked lanes
        pattern.forEach(lane => {
            const obstacle = this.createObstacle();
            obstacle.position.set(CONFIG.LANE_POSITIONS[lane], 1, z);
            obstacle.userData.lane = lane;
            scene.add(obstacle);
            obstacles.push(obstacle);
        });
        
        // Always spawn collectible in one empty lane
        const emptyLanes = [0, 1, 2].filter(l => !pattern.includes(l));
        if (emptyLanes.length > 0 && Math.random() < CONFIG.ORB_SPAWN_CHANCE) {
            const orbLane = emptyLanes[Math.floor(Math.random() * emptyLanes.length)];
            CollectibleManager.spawn(CONFIG.LANE_POSITIONS[orbLane], z);
        }
        
        this.lastSpawnZ = z;
    },
    
    createObstacle() {
        const group = new THREE.Group();
        
        // Randomize type
        const isGate = Math.random() > 0.5;
        
        if (!isGate) {
            // Cube obstacle
            const cubeGeo = new THREE.BoxGeometry(2.2, 2.2, 0.8);
            const cubeMat = new THREE.MeshStandardMaterial({
                color: 0x1a0022,
                emissive: CONFIG.COLORS.PINK,
                emissiveIntensity: 0.4,
                metalness: 0.6,
                roughness: 0.4,
                transparent: true,
                opacity: 0.85
            });
            const cube = new THREE.Mesh(cubeGeo, cubeMat);
            group.add(cube);
            
            // Edge glow
            const edgeGeo = new THREE.EdgesGeometry(cubeGeo);
            const edgeMat = new THREE.LineBasicMaterial({ 
                color: CONFIG.COLORS.PINK,
                transparent: true,
                opacity: 0.9
            });
            const edges = new THREE.LineSegments(edgeGeo, edgeMat);
            group.add(edges);
        } else {
            // Gate obstacle
            const gateMat = new THREE.MeshStandardMaterial({
                color: 0x001a22,
                emissive: CONFIG.COLORS.ORANGE,
                emissiveIntensity: 0.5,
                metalness: 0.7,
                roughness: 0.3
            });
            
            const pillarGeo = new THREE.BoxGeometry(0.25, 2.8, 0.25);
            
            // Left pillar
            const leftPillar = new THREE.Mesh(pillarGeo, gateMat);
            leftPillar.position.set(-1.1, 0.4, 0);
            group.add(leftPillar);
            
            // Right pillar
            const rightPillar = new THREE.Mesh(pillarGeo, gateMat);
            rightPillar.position.set(1.1, 0.4, 0);
            group.add(rightPillar);
            
            // Top bar
            const barGeo = new THREE.BoxGeometry(2.45, 0.25, 0.25);
            const topBar = new THREE.Mesh(barGeo, gateMat);
            topBar.position.set(0, 1.8, 0);
            group.add(topBar);
            
            // Blocking panel
            const panelGeo = new THREE.BoxGeometry(1.95, 1.4, 0.08);
            const panelMat = new THREE.MeshBasicMaterial({
                color: CONFIG.COLORS.ORANGE,
                transparent: true,
                opacity: 0.35
            });
            const panel = new THREE.Mesh(panelGeo, panelMat);
            panel.position.set(0, 0.7, 0);
            group.add(panel);
        }
        
        return group;
    },
    
    update(delta) {
        const moveAmount = GameState.speed * delta;
        
        // Move and cleanup obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            const obstacle = obstacles[i];
            obstacle.position.z -= moveAmount;
            
            if (obstacle.position.z < CONFIG.DESPAWN_DISTANCE) {
                scene.remove(obstacle);
                obstacles.splice(i, 1);
            }
        }
        
        // Spawn new obstacles
        this.lastSpawnZ -= moveAmount;
        while (this.lastSpawnZ < CONFIG.SPAWN_DISTANCE) {
            this.spawn();
        }
    },
    
    checkCollision() {
        if (!player) return false;
        
        const playerX = player.position.x;
        const playerZ = player.position.z;
        const hitboxWidth = 0.7;
        const hitboxDepth = 0.7;
        
        for (const obstacle of obstacles) {
            const oz = obstacle.position.z;
            const ox = obstacle.position.x;
            
            // Simple box collision
            if (Math.abs(oz - playerZ) < hitboxDepth &&
                Math.abs(ox - playerX) < hitboxWidth + 0.8) {
                return true;
            }
        }
        return false;
    },
    
    reset() {
        for (let i = obstacles.length - 1; i >= 0; i--) {
            scene.remove(obstacles[i]);
        }
        obstacles.length = 0;
        this.lastSpawnZ = 60;
    }
};

// ========================================
// COLLECTIBLES - Glowing Orbs
// ========================================
const CollectibleManager = {
    spawn(x, z) {
        const orb = this.createOrb();
        orb.position.set(x, 1.5, z);
        orb.userData.baseY = 1.5;
        orb.userData.phase = Math.random() * Math.PI * 2;
        scene.add(orb);
        collectibles.push(orb);
    },
    
    createOrb() {
        const group = new THREE.Group();
        
        // Core
        const coreGeo = new THREE.IcosahedronGeometry(0.28, 1);
        const coreMat = new THREE.MeshStandardMaterial({
            color: CONFIG.COLORS.CYAN,
            emissive: CONFIG.COLORS.CYAN,
            emissiveIntensity: 1,
            metalness: 0.9,
            roughness: 0.1
        });
        const core = new THREE.Mesh(coreGeo, coreMat);
        group.add(core);
        
        // Outer glow
        const glowGeo = new THREE.SphereGeometry(0.45, 12, 12);
        const glowMat = new THREE.MeshBasicMaterial({
            color: CONFIG.COLORS.CYAN,
            transparent: true,
            opacity: 0.25,
            side: THREE.BackSide
        });
        group.add(new THREE.Mesh(glowGeo, glowMat));
        
        // Ring
        const ringGeo = new THREE.TorusGeometry(0.35, 0.025, 6, 20);
        const ringMat = new THREE.MeshBasicMaterial({
            color: CONFIG.COLORS.WHITE,
            transparent: true,
            opacity: 0.5
        });
        group.add(new THREE.Mesh(ringGeo, ringMat));
        
        return group;
    },
    
    update(delta, elapsed) {
        const moveAmount = GameState.speed * delta;
        
        for (let i = collectibles.length - 1; i >= 0; i--) {
            const orb = collectibles[i];
            
            // Move toward player
            orb.position.z -= moveAmount;
            
            // Rotation
            orb.rotation.y += delta * 3;
            orb.rotation.x += delta * 2;
            
            // Bobbing
            orb.position.y = orb.userData.baseY + Math.sin(elapsed * 5 + orb.userData.phase) * 0.15;
            
            // Remove if behind
            if (orb.position.z < CONFIG.DESPAWN_DISTANCE) {
                scene.remove(orb);
                collectibles.splice(i, 1);
            }
        }
    },
    
    checkCollection() {
        if (!player) return;
        
        const playerX = player.position.x;
        const playerZ = player.position.z;
        const collectRadius = 1.3;
        
        for (let i = collectibles.length - 1; i >= 0; i--) {
            const orb = collectibles[i];
            const dx = orb.position.x - playerX;
            const dz = orb.position.z - playerZ;
            const dist = Math.sqrt(dx * dx + dz * dz);
            
            if (dist < collectRadius) {
                GameState.orbs++;
                GameState.score += 100;
                scene.remove(orb);
                collectibles.splice(i, 1);
                
                playCollectSound();
                flashScreen(0.08, '#00ffff');
            }
        }
    },
    
    reset() {
        for (let i = collectibles.length - 1; i >= 0; i--) {
            scene.remove(collectibles[i]);
        }
        collectibles.length = 0;
    }
};

// ========================================
// BEAT SYNC - Rhythm System
// ========================================
const BeatManager = {
    lastBeatTime: 0,
    beatCount: 0,
    intensity: 1,
    
    update(elapsed) {
        const beatInterval = CONFIG.BEAT_INTERVAL;
        const timeSinceBeat = elapsed - this.lastBeatTime;
        
        if (timeSinceBeat >= beatInterval) {
            this.onBeat();
            this.lastBeatTime = elapsed;
            this.beatCount++;
        }
        
        // Calculate beat phase (0-1)
        const phase = timeSinceBeat / beatInterval;
        this.intensity = Math.max(0, 1 - phase * 0.6);
        
        // Update visuals
        this.updateVisuals();
    },
    
    onBeat() {
        if (!GameState.isPlaying) return;
        
        // Beat indicator
        beatIndicator.classList.add('pulse');
        setTimeout(() => beatIndicator.classList.remove('pulse'), 80);
        
        // Camera micro-shake
        this.shakeCamera();
        
        // Sound
        playBeatSound();
        
        // Subtle flash
        flashScreen(0.03, '#ff00ff');
        
        // Speed increase
        if (GameState.speed < CONFIG.MAX_SPEED) {
            GameState.speed += CONFIG.SPEED_INCREMENT * 0.08;
        }
    },
    
    updateVisuals() {
        // Update floor materials
        const emissiveIntensity = 0.15 + this.intensity * 0.25;
        floorTiles.forEach(tile => {
            const floorMesh = tile.children[0];
            if (floorMesh && floorMesh.material) {
                floorMesh.material.emissiveIntensity = emissiveIntensity;
            }
        });
        
        // Player glow
        if (playerGlow && playerGlow.material) {
            playerGlow.material.opacity = 0.2 + this.intensity * 0.2;
        }
    },
    
    shakeCamera() {
        const shakeAmount = 0.06;
        camera.position.y = 4.5 + (Math.random() - 0.5) * shakeAmount;
        
        setTimeout(() => {
            camera.position.y = 4.5;
        }, 40);
    },
    
    reset() {
        this.lastBeatTime = 0;
        this.beatCount = 0;
        this.intensity = 1;
    }
};

// ========================================
// AUDIO - Sound Effects
// ========================================
function setupAudio() {
    try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        gainNode = audioContext.createGain();
        gainNode.connect(audioContext.destination);
        gainNode.gain.value = 0.25;
    } catch (e) {
        console.log('Audio not supported');
    }
}

function resumeAudio() {
    if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
    }
}

function playBeatSound() {
    if (!audioContext) return;
    
    try {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        
        osc.connect(gain);
        gain.connect(audioContext.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(70, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(35, audioContext.currentTime + 0.08);
        
        gain.gain.setValueAtTime(0.15, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.08);
        
        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + 0.08);
    } catch (e) {}
}

function playCollectSound() {
    if (!audioContext) return;
    
    try {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        
        osc.connect(gain);
        gain.connect(audioContext.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1760, audioContext.currentTime + 0.1);
        
        gain.gain.setValueAtTime(0.2, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.12);
        
        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + 0.12);
    } catch (e) {}
}

function playLaneChangeSound() {
    if (!audioContext) return;
    
    try {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        
        osc.connect(gain);
        gain.connect(audioContext.destination);
        
        osc.type = 'square';
        osc.frequency.setValueAtTime(330, audioContext.currentTime);
        
        gain.gain.setValueAtTime(0.08, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.04);
        
        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + 0.04);
    } catch (e) {}
}

function playGameOverSound() {
    if (!audioContext) return;
    
    try {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        
        osc.connect(gain);
        gain.connect(audioContext.destination);
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(180, audioContext.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioContext.currentTime + 0.4);
        
        gain.gain.setValueAtTime(0.25, audioContext.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.4);
        
        osc.start(audioContext.currentTime);
        osc.stop(audioContext.currentTime + 0.4);
    } catch (e) {}
}

// ========================================
// VISUAL EFFECTS
// ========================================
function flashScreen(intensity, color) {
    screenFlash.style.background = color;
    screenFlash.style.opacity = intensity;
    
    setTimeout(() => {
        screenFlash.style.opacity = 0;
    }, 40);
}

// ========================================
// CONTROLS - CORRECTED DIRECTIONS
// ========================================
function setupControls() {
    // Keyboard controls
    document.addEventListener('keydown', (e) => {
        if (!GameState.isPlaying) return;
        
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
            e.preventDefault();
            // CHANGED: Swapped from -1 to 1 (Now Left Arrow moves RIGHT)
            PlayerController.switchLane(1);
        }
        else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
            e.preventDefault();
            // CHANGED: Swapped from 1 to -1 (Now Right Arrow moves LEFT)
            PlayerController.switchLane(-1);
        }
    });
    
    // Touch / Swipe controls
    let touchStartX = 0;
    let touchStartTime = 0;
    
    canvas.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartTime = performance.now();
    }, { passive: true });
    
    canvas.addEventListener('touchend', (e) => {
        if (!GameState.isPlaying) return;
        
        const touchEndX = e.changedTouches[0].clientX;
        const diffX = touchEndX - touchStartX;
        const timeDiff = performance.now() - touchStartTime;
        
        // Quick swipe detection
        if (timeDiff < 300 && Math.abs(diffX) > 30) {
            if (diffX > 0) {
                // Swipe right
                PlayerController.switchLane(-1);
            } else {
                // Swipe left
                PlayerController.switchLane(1);
            }
        }
    }, { passive: true });
    
    // Mobile button controls
    document.getElementById('left-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (GameState.isPlaying) {
            PlayerController.switchLane(1);
        }
    });
    
    document.getElementById('right-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (GameState.isPlaying) {
            PlayerController.switchLane(-1);
        }
    });
    
    // Also handle click for desktop testing of mobile buttons
    document.getElementById('left-btn').addEventListener('click', () => {
        if (GameState.isPlaying) PlayerController.switchLane(-1);
    });
    
    document.getElementById('right-btn').addEventListener('click', () => {
        if (GameState.isPlaying) PlayerController.switchLane(1);
    });
    
    // UI Buttons
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', restartGame);
}
// ========================================
// VISIBILITY CHANGE HANDLER
// ========================================
function onVisibilityChange() {
    if (document.hidden && GameState.isPlaying) {
        GameState.isPaused = true;
    } else if (!document.hidden && GameState.isPaused) {
        GameState.isPaused = false;
        lastTime = performance.now();
    }
}

// ========================================
// GAME FLOW
// ========================================
function startGame() {
    resumeAudio();
    
    GameState.isPlaying = true;
    GameState.isPaused = false;
    GameState.distance = 0;
    GameState.orbs = 0;
    GameState.score = 0;
    GameState.currentLane = 1;
    GameState.speed = CONFIG.INITIAL_SPEED;
    GameState.gameStartTime = performance.now();
    
    PlayerController.reset();
    BeatManager.reset();
    
    startScreen.style.display = 'none';
    hud.style.display = 'flex';
    beatIndicator.style.display = 'block';
    if (window.innerWidth <= 768) {
        mobileControls.style.display = 'flex';
    }
    
    lastTime = performance.now();
}

function gameOver() {
    GameState.isPlaying = false;
    
    playGameOverSound();
    flashScreen(0.4, '#ff0066');
    
    // Calculate final score
    const finalScoreValue = GameState.score + Math.floor(GameState.distance);
    
    // Update display
    finalDistance.textContent = Math.floor(GameState.distance);
    finalOrbs.textContent = GameState.orbs;
    finalScore.textContent = finalScoreValue;
    
    // Show game over after brief delay
    setTimeout(() => {
        hud.style.display = 'none';
        beatIndicator.style.display = 'none';
        mobileControls.style.display = 'none';
        gameoverScreen.style.display = 'flex';
    }, 400);
}

function restartGame() {
    // Reset all managers
    ObstacleManager.reset();
    CollectibleManager.reset();
    
    // Reset floor positions
    floorTiles.forEach((tile, i) => {
        tile.position.z = i * tile.userData.length;
    });
    
    // Reset pillar positions
    const spacing = sidePillars[0]?.userData.spacing || 20;
    sidePillars.forEach((pillar, i) => {
        const pairIndex = Math.floor(i / 2);
        pillar.position.z = pairIndex * spacing;
    });
    
    // Hide game over
    gameoverScreen.style.display = 'none';
    
    // Start fresh
    startGame();
}

// ========================================
// UPDATE LOOP
// ========================================
function updateGame(delta, elapsed) {
    if (!GameState.isPlaying || GameState.isPaused) return;
    
    // Update beat system
    BeatManager.update(elapsed);
    
    // Update player
    PlayerController.update(delta, elapsed);
    
    // Update distance/score
    GameState.distance += GameState.speed * delta * 0.5;
    GameState.score = GameState.orbs * 100 + Math.floor(GameState.distance);
    
    // Update obstacles
    ObstacleManager.update(delta);
    
    // Update collectibles
    CollectibleManager.update(delta, elapsed);
    CollectibleManager.checkCollection();
    
    // Check collision
    if (ObstacleManager.checkCollision()) {
        gameOver();
        return;
    }
    
    // Update floor (infinite scroll)
    const moveAmount = GameState.speed * delta;
    const tileLength = floorTiles[0].userData.length;
    const totalLength = floorTiles.length * tileLength;
    
    floorTiles.forEach(tile => {
        tile.position.z -= moveAmount;
        if (tile.position.z < -tileLength) {
            tile.position.z += totalLength;
        }
    });
    
    // Update pillars
    const pillarSpacing = sidePillars[0]?.userData.spacing || 20;
    const totalPillarLength = (sidePillars.length / 2) * pillarSpacing;
    
    sidePillars.forEach(pillar => {
        pillar.position.z -= moveAmount;
        if (pillar.position.z < -pillarSpacing) {
            pillar.position.z += totalPillarLength;
        }
    });
    
    // Update particles
    if (particleSystem) {
        const positions = particleSystem.geometry.attributes.position.array;
        const velocities = particleSystem.geometry.userData.velocities;
        
        for (let i = 0; i < positions.length / 3; i++) {
            positions[i * 3 + 2] -= moveAmount * velocities[i];
            if (positions[i * 3 + 2] < -10) {
                positions[i * 3 + 2] += 160;
                positions[i * 3] = (Math.random() - 0.5) * 40;
                positions[i * 3 + 1] = Math.random() * 25;
            }
        }
        particleSystem.geometry.attributes.position.needsUpdate = true;
    }
    
    // Update HUD
    distanceValue.textContent = Math.floor(GameState.distance);
    orbsValue.textContent = GameState.orbs;
    scoreValue.textContent = GameState.score;
}

// ========================================
// RENDER LOOP - Smooth animation
// ========================================
function animate(currentTime = 0) {
    animationFrameId = requestAnimationFrame(animate);
    
    // Calculate delta with cap to prevent huge jumps after tab switch
    const delta = Math.min((currentTime - lastTime) / 1000, 0.05);
    lastTime = currentTime;
    
    // Skip if delta is too small
    if (delta < 0.001) return;
    
    // Calculate elapsed time for animations
    const elapsed = (currentTime - GameState.gameStartTime) / 1000;
    
    // Update game logic
    updateGame(delta, elapsed);
    
    // Render
    renderer.render(scene, camera);
}

// ========================================
// RESIZE HANDLER
// ========================================
function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    
    // Show/hide mobile controls
    if (GameState.isPlaying) {
        mobileControls.style.display = window.innerWidth <= 768 ? 'flex' : 'none';
    }
}

// ========================================
// START GAME
// ========================================
init();
    </script>
