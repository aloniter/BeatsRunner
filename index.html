<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Beat Runner - Neon Rhythm Game</title>

    <link rel="icon" type="image/png" href="icon.png">
    
    <style>
        /* ========================================
           CORE & RESET
           ======================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Remove tap highlight on iOS */
            user-select: none; /* Prevent text selection */
            -webkit-user-select: none;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; /* Critical for preventing scroll on mobile */
            width: 100vw;
            height: 100vh;
            /* Fix for 100vh on mobile browsers */
            height: -webkit-fill-available; 
        }

        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ========================================
           HUD - OPTIMIZED FOR IPHONE
           ======================================== */
        #hud {
            position: fixed;
            /* Safe area logic for the Notch/Dynamic Island */
            top: max(20px, env(safe-area-inset-top) + 10px);
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-evenly; /* Spread items evenly */
            z-index: 100;
            pointer-events: none;
            padding: 0 10px;
        }

        .hud-item {
            text-align: center;
            color: #fff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            background: rgba(0, 0, 0, 0.3); /* Slight contrast backing */
            padding: 5px 15px;
            border-radius: 15px;
            backdrop-filter: blur(4px);
        }

        .hud-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            color: #00ffff;
        }

        .hud-value {
            font-size: 24px;
            font-weight: 800; /* Extra bold for readability */
            font-variant-numeric: tabular-nums; /* Keeps numbers from jumping */
        }

        /* ========================================
           START SCREEN
           ======================================== */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, rgba(20, 0, 40, 0.95) 0%, rgba(0, 0, 0, 1) 100%);
            z-index: 200;
            padding: 20px;
        }

        #start-screen h1 {
            font-size: 48px; /* Adjusted for mobile */
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 5px;
            text-align: center;
            line-height: 1;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
            50% { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff; }
        }

        #start-screen .subtitle {
            font-size: 16px;
            color: #00ffff;
            letter-spacing: 3px;
            margin-bottom: 40px;
            text-transform: uppercase;
            text-align: center;
        }

        /* ========================================
           CREATOR NAME - NEON STYLE
           ======================================== */
        .creator-name {
            font-size: 16px;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: bold;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff;
            animation: namePulse 2s ease-in-out infinite;
        }

        @keyframes namePulse {
            0%, 100% { opacity: 0.8; text-shadow: 0 0 10px #ff00ff; }
            50% { opacity: 1; text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff; }
        }

        /* ========================================
           BUTTONS
           ======================================== */
        .btn {
            padding: 18px 50px;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 2px solid #ff00ff;
            border-radius: 50px; /* Pill shape is more modern/iOS */
            background: rgba(255, 0, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active {
            transform: scale(0.95);
            background: #ff00ff;
            color: #000;
        }

        .controls-info {
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            text-align: center;
            line-height: 1.6;
        }

        /* ========================================
           MOBILE CONTROLS - REFINED
           ======================================== */
        #mobile-controls {
            position: fixed;
            /* Lift well above the iOS Home Bar */
            bottom: max(30px, env(safe-area-inset-bottom) + 30px);
            left: 0;
            width: 100%;
            display: none; /* Shown via JS on mobile */
            justify-content: space-between;
            padding: 0 30px;
            z-index: 150;
        }

        .mobile-btn {
            width: 90px;
            height: 90px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            /* Frosted glass effect */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 30px;
            transition: all 0.1s;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .mobile-btn:active {
            background: rgba(0, 255, 255, 0.4);
            border-color: #00ffff;
            transform: scale(0.9);
            box-shadow: 0 0 30px #00ffff;
            color: #fff;
        }

        /* ========================================
           GAME OVER & UTILS
           ======================================== */
        #gameover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.95);
            z-index: 200;
        }

        #gameover-screen h2 {
            font-size: 42px;
            color: #ff0066;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff0066;
        }

        .final-score {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 8px;
        }

        .final-score span {
            color: #00ffff;
            font-size: 28px;
            font-weight: bold;
        }

        #screen-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
            transition: opacity 0.05s ease-out;
        }

        #beat-indicator {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            border: 20px solid #ff00ff;
            opacity: 0;
            pointer-events: none;
            z-index: 90;
            box-sizing: border-box;
            display: none;
        }
        
        #beat-indicator.pulse {
            animation: screenBorderPulse 0.1s ease-out;
        }
        
        @keyframes screenBorderPulse {
            0% { opacity: 0.3; }
            100% { opacity: 0; }
        }

        /* Landscape warning for small phones if needed, 
           but this game works best in Portrait on phone */
        @media (max-height: 500px) {
            #mobile-controls { display: none !important; }
            .hud-value { font-size: 18px; }
        }
    </style>
</head>
<body>
    <canvas id="game-canvas"></canvas>
    
    <div id="hud">
        <div class="hud-item">
            <div class="hud-label">Dist</div>
            <div class="hud-value" id="distance-value">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Orbs</div>
            <div class="hud-value" id="orbs-value">0</div>
        </div>
        <div class="hud-item">
            <div class="hud-label">Score</div>
            <div class="hud-value" id="score-value">0</div>
        </div>
    </div>

    <div id="mobile-controls">
        <div class="mobile-btn" id="left-btn">◀</div>
        <div class="mobile-btn" id="right-btn">▶</div>
    </div>

    <div id="start-screen">
        <h1>Beat<br>Runner</h1>
        <div class="subtitle">Neon Rhythm</div>
        
        <div class="creator-name">By Alon Iter</div>
        <button class="btn" id="start-btn">TAP TO START</button>
        <div class="controls-info">
            <div>Use Headphones for Best Experience</div>
        </div>
    </div>

    <div id="gameover-screen">
        <h2>Game Over</h2>
        <div class="final-score">Distance: <span id="final-distance">0</span>m</div>
        <div class="final-score">Orbs: <span id="final-orbs">0</span></div>
        <div class="final-score">Score: <span id="final-score">0</span></div>
        <button class="btn" id="restart-btn" style="margin-top: 30px;">Play Again</button>
    </div>

    <div id="beat-indicator"></div>
    <div id="screen-flash"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
/* ========================================
   BEAT RUNNER - OPTIMIZED LOGIC
   ======================================== */

// ========================================
// CONFIGURATION
// ========================================
const CONFIG = {
    LANE_WIDTH: 3,
    LANE_POSITIONS: [-3, 0, 3], // 0=Left, 1=Center, 2=Right
    INITIAL_SPEED: 28,
    MAX_SPEED: 55,
    SPEED_INCREMENT: 0.3,
    BPM: 128,
    get BEAT_INTERVAL() { return 60 / this.BPM; },
    SPAWN_DISTANCE: 120,
    DESPAWN_DISTANCE: -15,
    OBSTACLE_MIN_GAP: 18,
    ORB_SPAWN_CHANCE: 0.5,
    FOG_NEAR: 25,
    FOG_FAR: 120,
    COLORS: {
        PINK: 0xff00ff,
        CYAN: 0x00ffff,
        PURPLE: 0x9900ff,
        BLUE: 0x0066ff,
        ORANGE: 0xff6600,
        WHITE: 0xffffff
    }
};

// ========================================
// GAME STATE
// ========================================
const GameState = {
    isPlaying: false,
    isPaused: false,
    distance: 0,
    orbs: 0,
    score: 0,
    currentLane: 1, // Start in center
    speed: CONFIG.INITIAL_SPEED,
    lastBeatTime: 0,
    beatPhase: 0,
    gameStartTime: 0
};

// Global variables
let scene, camera, renderer;
let player, playerGlow, playerRing;
let obstacles = [];
let collectibles = [];
let floorTiles = [];
let sidePillars = [];
let particleSystem;
let animationFrameId;
let lastTime = 0;
let audioContext, gainNode;

// DOM Elements
const canvas = document.getElementById('game-canvas');
const hud = document.getElementById('hud');
const startScreen = document.getElementById('start-screen');
const gameoverScreen = document.getElementById('gameover-screen');
const beatIndicator = document.getElementById('beat-indicator');
const screenFlash = document.getElementById('screen-flash');
const mobileControls = document.getElementById('mobile-controls');

// HUD Values
const distanceValue = document.getElementById('distance-value');
const orbsValue = document.getElementById('orbs-value');
const scoreValue = document.getElementById('score-value');
const finalDistance = document.getElementById('final-distance');
const finalOrbs = document.getElementById('final-orbs');
const finalScore = document.getElementById('final-score');

// ========================================
// INITIALIZATION
// ========================================
function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050010);
    scene.fog = new THREE.Fog(0x050010, CONFIG.FOG_NEAR, CONFIG.FOG_FAR);
    
    // Camera adjusted for better mobile FOV
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 4.5, -7);
    camera.lookAt(0, 1.5, 30);
    
    renderer = new THREE.WebGLRenderer({ 
        canvas: canvas, 
        antialias: window.devicePixelRatio < 2,
        powerPreference: "high-performance"
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    
    createLights();
    createFloor();
    createPlayer();
    createSidePillars();
    createParticles();
    
    setupAudio();
    setupControls();
    
    window.addEventListener('resize', onWindowResize);
    document.addEventListener('visibilitychange', onVisibilityChange);
    
    // Initial Render
    renderer.render(scene, camera);
}

// ========================================
// LIGHTS & ENV
// ========================================
function createLights() {
    const ambient = new THREE.AmbientLight(0x333355, 0.6);
    scene.add(ambient);
    const hemi = new THREE.HemisphereLight(0x0066ff, 0xff00ff, 0.3);
    scene.add(hemi);
    
    const pinkLight = new THREE.PointLight(CONFIG.COLORS.PINK, 1.5, 40);
    pinkLight.position.set(-8, 4, 15);
    scene.add(pinkLight);
    
    const cyanLight = new THREE.PointLight(CONFIG.COLORS.CYAN, 1.5, 40);
    cyanLight.position.set(8, 4, 15);
    scene.add(cyanLight);
}

function createFloor() {
    const tileLength = 25;
    const numTiles = 10;
    for (let i = 0; i < numTiles; i++) {
        const tile = createFloorTile(tileLength);
        tile.position.z = i * tileLength;
        tile.userData.length = tileLength;
        scene.add(tile);
        floorTiles.push(tile);
    }
}

function createFloorTile(length) {
    const group = new THREE.Group();
    const floorGeo = new THREE.PlaneGeometry(14, length, 1, 1);
    const floorMat = new THREE.MeshStandardMaterial({
        color: 0x0a0a1a,
        emissive: 0x110022,
        emissiveIntensity: 0.2,
        metalness: 0.7,
        roughness: 0.4
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    group.add(floor);
    
    // Simple dividers
    const dividerGeo = new THREE.BoxGeometry(0.08, 0.08, length);
    const dividerMat = new THREE.MeshBasicMaterial({ color: CONFIG.COLORS.PINK, transparent: true, opacity: 0.7 });
    [-1.5, 1.5].forEach(x => {
        const divider = new THREE.Mesh(dividerGeo, dividerMat);
        divider.position.set(x, 0.04, 0);
        group.add(divider);
    });
    
    // Edges
    const edgeGeo = new THREE.BoxGeometry(0.15, 0.15, length);
    const edgeMat = new THREE.MeshBasicMaterial({ color: CONFIG.COLORS.CYAN, transparent: true, opacity: 0.85 });
    [-7, 7].forEach(x => {
        const edge = new THREE.Mesh(edgeGeo, edgeMat);
        edge.position.set(x, 0.08, 0);
        group.add(edge);
    });
    
    return group;
}

// ========================================
// PLAYER
// ========================================
function createPlayer() {
    const group = new THREE.Group();
    const sphereGeo = new THREE.SphereGeometry(0.45, 16, 16);
    const sphereMat = new THREE.MeshStandardMaterial({
        color: CONFIG.COLORS.CYAN,
        emissive: CONFIG.COLORS.CYAN,
        emissiveIntensity: 0.9,
        metalness: 0.9,
        roughness: 0.1
    });
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    group.add(sphere);
    
    const glowGeo = new THREE.SphereGeometry(0.6, 12, 12);
    const glowMat = new THREE.MeshBasicMaterial({ color: CONFIG.COLORS.CYAN, transparent: true, opacity: 0.25, side: THREE.BackSide });
    playerGlow = new THREE.Mesh(glowGeo, glowMat);
    group.add(playerGlow);
    
    const ringGeo = new THREE.TorusGeometry(0.6, 0.04, 8, 16);
    const ringMat = new THREE.MeshBasicMaterial({ color: CONFIG.COLORS.PINK, transparent: true, opacity: 0.7 });
    playerRing = new THREE.Mesh(ringGeo, ringMat);
    playerRing.rotation.x = Math.PI / 2;
    group.add(playerRing);
    
    const playerLight = new THREE.PointLight(CONFIG.COLORS.CYAN, 1.5, 8);
    group.add(playerLight);
    
    group.position.set(0, 1, 0);
    scene.add(group);
    player = group;
}

// ========================================
// CONTROLLER
// ========================================
const PlayerController = {
    targetX: 0,
    currentX: 0,
    laneChangeSpeed: 12,
    bobOffset: 0,
    
    // Direction: -1 = LEFT, 1 = RIGHT (Standard Logic)
    // NOTE: Lane 0 is Left (-3), Lane 2 is Right (+3)
    switchLane(direction) {
        if (!GameState.isPlaying) return;
        
        const newLane = GameState.currentLane + direction;
        
        if (newLane >= 0 && newLane <= 2) {
            GameState.currentLane = newLane;
            this.targetX = CONFIG.LANE_POSITIONS[newLane];
            playLaneChangeSound();
            
            // Tilt player immediately
            if (player) {
                player.rotation.z = -direction * 0.4;
            }
        }
    },
    
    update(delta, elapsed) {
        const diff = this.targetX - this.currentX;
        this.currentX += diff * Math.min(this.laneChangeSpeed * delta, 0.35);
        player.position.x = this.currentX;
        
        // Recover tilt
        const targetTilt = -diff * 0.3;
        player.rotation.z += (targetTilt - player.rotation.z) * 8 * delta;
        
        this.bobOffset = Math.sin(elapsed * 6) * 0.08;
        player.position.y = 1 + this.bobOffset;
        
        if (playerGlow) playerGlow.rotation.y += delta * 1.5;
        if (playerRing) playerRing.rotation.z += delta * 2;
    },
    
    reset() {
        this.targetX = 0;
        this.currentX = 0;
        GameState.currentLane = 1;
        if (player) {
            player.position.set(0, 1, 0);
            player.rotation.set(0, 0, 0);
        }
    }
};

// ========================================
// ENV OBJECTS
// ========================================
function createSidePillars() {
    const pillarCount = 10;
    const spacing = 20;
    for (let i = 0; i < pillarCount; i++) {
        [-12, 12].forEach(x => {
            const pillar = createPillar(x < 0);
            pillar.position.set(x, 0, i * spacing);
            pillar.userData.spacing = spacing;
            scene.add(pillar);
            sidePillars.push(pillar);
        });
    }
}

function createPillar(isLeft) {
    const group = new THREE.Group();
    const pillarGeo = new THREE.BoxGeometry(0.4, 12, 0.4);
    const pillarMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, emissive: CONFIG.COLORS.PURPLE, emissiveIntensity: 0.25 });
    const pillar = new THREE.Mesh(pillarGeo, pillarMat);
    pillar.position.y = 6;
    group.add(pillar);
    
    const stripGeo = new THREE.BoxGeometry(0.08, 11, 0.08);
    const stripColor = isLeft ? CONFIG.COLORS.PINK : CONFIG.COLORS.CYAN;
    const stripMat = new THREE.MeshBasicMaterial({ color: stripColor });
    const strip = new THREE.Mesh(stripGeo, stripMat);
    strip.position.set(isLeft ? 0.2 : -0.2, 6, 0.2);
    group.add(strip);
    
    return group;
}

function createParticles() {
    const particleCount = 200;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const velocities = new Float32Array(particleCount);
    
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 40;
        positions[i * 3 + 1] = Math.random() * 25;
        positions[i * 3 + 2] = Math.random() * 150;
        velocities[i] = 0.3 + Math.random() * 0.7;
    }
    
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.userData.velocities = velocities;
    const material = new THREE.PointsMaterial({ color: CONFIG.COLORS.CYAN, size: 0.15, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
    particleSystem = new THREE.Points(geometry, material);
    scene.add(particleSystem);
}

// ========================================
// GAMEPLAY LOGIC
// ========================================
const ObstacleManager = {
    lastSpawnZ: 60,
    patterns: [[0], [1], [2], [0, 1], [1, 2], [0, 2]],
    spawn() {
        const z = this.lastSpawnZ + CONFIG.OBSTACLE_MIN_GAP + Math.random() * 12;
        const pattern = this.patterns[Math.floor(Math.random() * this.patterns.length)];
        
        pattern.forEach(lane => {
            const obstacle = this.createObstacle();
            obstacle.position.set(CONFIG.LANE_POSITIONS[lane], 1, z);
            scene.add(obstacle);
            obstacles.push(obstacle);
        });
        
        const emptyLanes = [0, 1, 2].filter(l => !pattern.includes(l));
        if (emptyLanes.length > 0 && Math.random() < CONFIG.ORB_SPAWN_CHANCE) {
            const orbLane = emptyLanes[Math.floor(Math.random() * emptyLanes.length)];
            CollectibleManager.spawn(CONFIG.LANE_POSITIONS[orbLane], z);
        }
        this.lastSpawnZ = z;
    },
    createObstacle() {
        const group = new THREE.Group();
        // Optimization: Simple box for obstacles on mobile
        const cubeGeo = new THREE.BoxGeometry(2.2, 2.2, 0.8);
        const cubeMat = new THREE.MeshStandardMaterial({
            color: 0x1a0022, emissive: CONFIG.COLORS.PINK, emissiveIntensity: 0.4,
            transparent: true, opacity: 0.9
        });
        const cube = new THREE.Mesh(cubeGeo, cubeMat);
        group.add(cube);
        
        // Edge lines (visual pop)
        const edges = new THREE.LineSegments(
            new THREE.EdgesGeometry(cubeGeo),
            new THREE.LineBasicMaterial({ color: CONFIG.COLORS.PINK })
        );
        group.add(edges);
        return group;
    },
    update(delta) {
        const moveAmount = GameState.speed * delta;
        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].position.z -= moveAmount;
            if (obstacles[i].position.z < CONFIG.DESPAWN_DISTANCE) {
                scene.remove(obstacles[i]);
                obstacles.splice(i, 1);
            }
        }
        this.lastSpawnZ -= moveAmount;
        while (this.lastSpawnZ < CONFIG.SPAWN_DISTANCE) this.spawn();
    },
    checkCollision() {
        if (!player) return false;
        const pZ = player.position.z;
        const pX = player.position.x;
        for (const obs of obstacles) {
            if (Math.abs(obs.position.z - pZ) < 0.7 && Math.abs(obs.position.x - pX) < 1.5) {
                return true;
            }
        }
        return false;
    },
    reset() {
        obstacles.forEach(o => scene.remove(o));
        obstacles.length = 0;
        this.lastSpawnZ = 60;
    }
};

const CollectibleManager = {
    spawn(x, z) {
        const orb = this.createOrb();
        orb.position.set(x, 1.5, z);
        orb.userData.baseY = 1.5;
        orb.userData.phase = Math.random() * Math.PI * 2;
        scene.add(orb);
        collectibles.push(orb);
    },
    createOrb() {
        const group = new THREE.Group();
        const coreGeo = new THREE.IcosahedronGeometry(0.28, 0);
        const coreMat = new THREE.MeshStandardMaterial({ color: CONFIG.COLORS.CYAN, emissive: CONFIG.COLORS.CYAN, emissiveIntensity: 1 });
        group.add(new THREE.Mesh(coreGeo, coreMat));
        return group;
    },
    update(delta, elapsed) {
        const moveAmount = GameState.speed * delta;
        for (let i = collectibles.length - 1; i >= 0; i--) {
            const orb = collectibles[i];
            orb.position.z -= moveAmount;
            orb.rotation.y += delta * 3;
            orb.position.y = orb.userData.baseY + Math.sin(elapsed * 5 + orb.userData.phase) * 0.15;
            if (orb.position.z < CONFIG.DESPAWN_DISTANCE) {
                scene.remove(orb);
                collectibles.splice(i, 1);
            }
        }
    },
    checkCollection() {
        if (!player) return;
        const pX = player.position.x;
        const pZ = player.position.z;
        for (let i = collectibles.length - 1; i >= 0; i--) {
            const orb = collectibles[i];
            if (Math.hypot(orb.position.x - pX, orb.position.z - pZ) < 1.3) {
                GameState.orbs++;
                GameState.score += 100;
                scene.remove(orb);
                collectibles.splice(i, 1);
                playCollectSound();
                flashScreen(0.08, '#00ffff');
            }
        }
    },
    reset() {
        collectibles.forEach(c => scene.remove(c));
        collectibles.length = 0;
    }
};

const BeatManager = {
    lastBeatTime: 0,
    update(elapsed) {
        if (elapsed - this.lastBeatTime >= CONFIG.BEAT_INTERVAL) {
            this.onBeat();
            this.lastBeatTime = elapsed;
        }
    },
    onBeat() {
        if (!GameState.isPlaying) return;
        
        // Visual Pulse
        beatIndicator.style.display = 'block';
        beatIndicator.classList.remove('pulse');
        void beatIndicator.offsetWidth; // Trigger reflow
        beatIndicator.classList.add('pulse');
        
        playBeatSound();
        if (GameState.speed < CONFIG.MAX_SPEED) GameState.speed += CONFIG.SPEED_INCREMENT * 0.08;
    },
    reset() { this.lastBeatTime = 0; }
};

// ========================================
// AUDIO SYSTEM
// ========================================
function setupAudio() {
    window.AudioContext = window.AudioContext || window.webkitAudioContext;
    if (window.AudioContext) audioContext = new AudioContext();
}

function resumeAudio() {
    if (audioContext && audioContext.state === 'suspended') {
        audioContext.resume();
    }
}

function playTone(freq, type, duration, vol) {
    if (!audioContext) return;
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioContext.currentTime);
    gain.gain.setValueAtTime(vol, audioContext.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioContext.destination);
    osc.start();
    osc.stop(audioContext.currentTime + duration);
}

function playBeatSound() { playTone(60, 'sine', 0.1, 0.1); }
function playCollectSound() { playTone(880, 'sine', 0.15, 0.15); }
function playLaneChangeSound() { playTone(300, 'square', 0.05, 0.05); }
function playGameOverSound() { playTone(150, 'sawtooth', 0.5, 0.2); }

function flashScreen(opacity, color) {
    screenFlash.style.background = color;
    screenFlash.style.opacity = opacity;
    setTimeout(() => { screenFlash.style.opacity = 0; }, 50);
}

// ========================================
// INPUT HANDLING - OPTIMIZED FOR MOBILE
// ========================================
function setupControls() {
    // Keyboard
    document.addEventListener('keydown', (e) => {
        if (!GameState.isPlaying) return;
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') PlayerController.switchLane(-1);
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') PlayerController.switchLane(1);
    });

    // Touch Handling with prevention of default behaviors
    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');

    const handleTouch = (direction, e) => {
        if(e) {
            e.preventDefault(); // Stop zoom/scroll
            e.stopPropagation();
        }
        if (GameState.isPlaying) {
            PlayerController.switchLane(direction);
        }
    };

    // Add listeners with passive: false to allow preventDefault
    leftBtn.addEventListener('touchstart', (e) => handleTouch(-1, e), { passive: false });
    rightBtn.addEventListener('touchstart', (e) => handleTouch(1, e), { passive: false });

    // Swipe Backup (Full Screen)
    let touchStartX = 0;
    canvas.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
    }, { passive: true });

    canvas.addEventListener('touchend', (e) => {
        if (!GameState.isPlaying) return;
        const diffX = e.changedTouches[0].clientX - touchStartX;
        if (Math.abs(diffX) > 40) {
            PlayerController.switchLane(diffX > 0 ? 1 : -1);
        }
    }, { passive: true });

    // Buttons
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('restart-btn').addEventListener('click', restartGame);
    
    // Stop double-tap to zoom
    document.addEventListener('dblclick', (e) => e.preventDefault(), { passive: false });
}

// ========================================
// GAME LOOP
// ========================================
function startGame() {
    resumeAudio();
    GameState.isPlaying = true;
    GameState.isPaused = false;
    GameState.distance = 0;
    GameState.orbs = 0;
    GameState.score = 0;
    GameState.currentLane = 1;
    GameState.speed = CONFIG.INITIAL_SPEED;
    GameState.gameStartTime = performance.now();
    
    PlayerController.reset();
    BeatManager.reset();
    ObstacleManager.reset();
    CollectibleManager.reset();
    
    startScreen.style.display = 'none';
    hud.style.display = 'flex';
    
    // Check if mobile for controls display
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
        mobileControls.style.display = 'flex';
    }
    
    lastTime = performance.now();
    animate();
}

function gameOver() {
    GameState.isPlaying = false;
    playGameOverSound();
    flashScreen(0.4, '#ff0066');
    
    finalDistance.textContent = Math.floor(GameState.distance);
    finalOrbs.textContent = GameState.orbs;
    finalScore.textContent = GameState.score;
    
    setTimeout(() => {
        hud.style.display = 'none';
        beatIndicator.style.display = 'none';
        mobileControls.style.display = 'none';
        gameoverScreen.style.display = 'flex';
    }, 400);
}

function restartGame() {
    gameoverScreen.style.display = 'none';
    startGame();
}

function updateGame(delta, elapsed) {
    if (!GameState.isPlaying || GameState.isPaused) return;
    
    BeatManager.update(elapsed);
    PlayerController.update(delta, elapsed);
    
    GameState.distance += GameState.speed * delta * 0.5;
    GameState.score = GameState.orbs * 100 + Math.floor(GameState.distance);
    
    ObstacleManager.update(delta);
    CollectibleManager.update(delta, elapsed);
    CollectibleManager.checkCollection();
    
    if (ObstacleManager.checkCollision()) {
        gameOver();
        return;
    }
    
    // Scroll environment
    const moveAmount = GameState.speed * delta;
    
    // Tiles
    const tileLen = floorTiles[0].userData.length;
    floorTiles.forEach(t => {
        t.position.z -= moveAmount;
        if(t.position.z < -tileLen) t.position.z += floorTiles.length * tileLen;
    });
    
    // Pillars
    const pSpacing = sidePillars[0].userData.spacing;
    sidePillars.forEach(p => {
        p.position.z -= moveAmount;
        if(p.position.z < -pSpacing) p.position.z += (sidePillars.length / 2) * pSpacing;
    });
    
    // Particles
    const pos = particleSystem.geometry.attributes.position.array;
    for(let i=0; i<pos.length/3; i++) {
        pos[i*3+2] -= moveAmount * particleSystem.geometry.userData.velocities[i];
        if(pos[i*3+2] < -10) {
            pos[i*3+2] += 160;
            pos[i*3] = (Math.random()-0.5)*40;
        }
    }
    particleSystem.geometry.attributes.position.needsUpdate = true;
    
    // HUD Update
    distanceValue.textContent = Math.floor(GameState.distance);
    orbsValue.textContent = GameState.orbs;
    scoreValue.textContent = GameState.score;
}

function animate(currTime = 0) {
    animationFrameId = requestAnimationFrame(animate);
    const delta = Math.min((currTime - lastTime) / 1000, 0.05);
    lastTime = currTime;
    
    if(delta < 0.001) return;
    updateGame(delta, (currTime - GameState.gameStartTime) / 1000);
    renderer.render(scene, camera);
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function onVisibilityChange() {
    if (document.hidden && GameState.isPlaying) {
        GameState.isPaused = true;
    } else if (!document.hidden && GameState.isPaused) {
        GameState.isPaused = false;
        lastTime = performance.now();
    }
}

// Start
init();
    </script>
